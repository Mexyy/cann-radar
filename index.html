<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CANN GitCode 数据分析</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⭐</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e0e0e0; }

    header { padding: 32px 40px 20px; border-bottom: 1px solid #222; }
    header h1 { font-size: 22px; font-weight: 600; color: #fff; }
    header p  { margin-top: 6px; font-size: 13px; color: #888; }

    /* 页签 */
    .tabs { display: flex; gap: 4px; padding: 20px 40px 0; border-bottom: 1px solid #222; }
    .tab { padding: 10px 20px; font-size: 14px; color: #888; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
    .tab:hover { color: #ccc; }
    .tab.active { color: #7eb6ff; border-bottom-color: #7eb6ff; }

    /* 面板 */
    .panel { display: none; }
    .panel.active { display: block; }

    /* 概览 */
    .stats { display: flex; gap: 16px; padding: 24px 40px; flex-wrap: wrap; }
    .stat-card { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 10px; padding: 18px 24px; flex: 1; min-width: 140px; }
    .stat-card .val { font-size: 28px; font-weight: 700; color: #7eb6ff; }
    .stat-card .lbl { font-size: 12px; color: #888; margin-top: 4px; }
    .charts { padding: 0 40px 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .chart-box { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 10px; padding: 20px; }
    .chart-box h2 { font-size: 14px; font-weight: 600; color: #ccc; margin-bottom: 12px; }
    .chart { width: 100%; height: 360px; }
    .chart-wide { grid-column: 1 / -1; }

    /* 仓库详情 */
    .repo-panel { padding: 24px 40px; }
    .repo-selector { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .repo-selector label { font-size: 14px; color: #aaa; }
    .repo-selector select {
      background: #1a1d27; border: 1px solid #3a3d4a; border-radius: 8px;
      color: #e0e0e0; padding: 8px 14px; font-size: 14px; cursor: pointer; min-width: 260px;
    }
    .repo-selector select:focus { outline: none; border-color: #7eb6ff; }
    .repo-link { font-size: 13px; color: #7eb6ff; text-decoration: none; }
    .repo-link:hover { text-decoration: underline; }

    .repo-stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
    .repo-stat { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 8px; padding: 14px 20px; flex: 1; min-width: 100px; }
    .repo-stat .val { font-size: 24px; font-weight: 700; color: #7eb6ff; }
    .repo-stat .lbl { font-size: 11px; color: #888; margin-top: 3px; }

    .repo-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }

    /* 用户列表 */
    .user-list-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .user-list-header h2 { font-size: 14px; font-weight: 600; color: #ccc; }
    .filter-btns { display: flex; gap: 6px; }
    .filter-btn {
      padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
      border: 1px solid #3a3d4a; background: transparent; color: #aaa; transition: all .15s;
    }
    .filter-btn.active { background: #7eb6ff22; border-color: #7eb6ff; color: #7eb6ff; }
    .user-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .user-table th { text-align: left; padding: 8px 12px; color: #666; font-weight: 500; border-bottom: 1px solid #222; }
    .user-table td { padding: 8px 12px; border-bottom: 1px solid #1e2130; vertical-align: middle; }
    .user-table tr:hover td { background: #1a1d27; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
    .badge-developer    { background: #5b8def22; color: #5b8def; border: 1px solid #5b8def44; }
    .badge-star_enthusiast { background: #4ecdc422; color: #4ecdc4; border: 1px solid #4ecdc444; }
    .badge-die_hard_fan { background: #f5a62322; color: #f5a623; border: 1px solid #f5a62344; }
    .user-link { color: #7eb6ff; text-decoration: none; }
    .user-link:hover { text-decoration: underline; }
    .pagination { display: flex; gap: 6px; align-items: center; margin-top: 14px; }
    .page-btn { padding: 5px 12px; border-radius: 6px; border: 1px solid #3a3d4a; background: transparent; color: #aaa; cursor: pointer; font-size: 13px; }
    .page-btn:hover { border-color: #7eb6ff; color: #7eb6ff; }
    .page-btn.active { background: #7eb6ff22; border-color: #7eb6ff; color: #7eb6ff; }
    .page-info { font-size: 12px; color: #555; margin-left: 8px; }

    .note { padding: 0 40px 24px; font-size: 12px; color: #555; }

    @media (max-width: 768px) {
      .charts, .repo-charts { grid-template-columns: 1fr; }
      .charts, .repo-charts { padding: 0 16px 24px; }
      .stats, .repo-panel { padding: 16px; }
      header, .tabs { padding-left: 16px; padding-right: 16px; }
    }
  </style>
</head>
<body>

<header>
  <h1>CANN GitCode 数据分析</h1>
  <p id="update-time">数据加载中...</p>
</header>

<div class="tabs">
  <div class="tab active" data-panel="overview">组织概览</div>
  <div class="tab" data-panel="repo">仓库详情</div>
</div>

<!-- 概览面板 -->
<div class="panel active" id="panel-overview">
  <div class="stats" id="stats-row"></div>
  <div class="charts">
    <div class="chart-box chart-wide">
      <h2>各仓库 Star / Fork / Issue 数</h2>
      <div class="chart" id="chart-repos"></div>
    </div>
    <div class="chart-box">
      <h2>Star 用户类型分布（全组织）</h2>
      <div class="chart" id="chart-user-type"></div>
    </div>
    <div class="chart-box">
      <h2>各仓库非开发者占比 Top 20</h2>
      <div class="chart" id="chart-ghost-rate"></div>
    </div>
    <div class="chart-box">
      <h2>仓库 Star 数分布</h2>
      <div class="chart" id="chart-star-dist"></div>
    </div>
    <div class="chart-box">
      <h2>Star 多个仓库的用户数量</h2>
      <div class="chart" id="chart-multi-star"></div>
    </div>
  </div>
  <p class="note" id="note"></p>
</div>

<!-- 仓库详情面板 -->
<div class="panel" id="panel-repo">
  <div class="repo-panel">
    <div class="repo-selector">
      <label>选择仓库：</label>
      <select id="repo-select"></select>
      <a id="repo-ext-link" class="repo-link" href="#" target="_blank">在 GitCode 查看 →</a>
    </div>
    <div class="repo-stats" id="repo-stats"></div>
    <div class="repo-charts">
      <div class="chart-box">
        <h2>用户类型分布</h2>
        <div class="chart" id="chart-repo-type"></div>
      </div>
      <div class="chart-box">
        <h2>Star 时间分布（按月）</h2>
        <div class="chart" id="chart-repo-timeline"></div>
      </div>
    </div>
    <div class="chart-box" style="margin-bottom:20px">
      <h2>各类用户 Star 时间对比</h2>
      <div class="chart" id="chart-repo-type-timeline"></div>
    </div>
    <div class="chart-box">
      <div class="user-list-header">
        <h2 id="user-list-title">Star 用户列表</h2>
        <div class="filter-btns" id="filter-btns">
          <button class="filter-btn active" data-type="all">全部</button>
          <button class="filter-btn" data-type="developer">开发者</button>
          <button class="filter-btn" data-type="star_enthusiast">Star 爱好者</button>
          <button class="filter-btn" data-type="die_hard_fan">铁粉</button>
        </div>
      </div>
      <table class="user-table">
        <thead>
          <tr>
            <th>#</th>
            <th>用户名</th>
            <th>昵称</th>
            <th>类型</th>
            <th>粉丝</th>
            <th>原创仓库</th>
            <th>年贡献</th>
            <th>Star 的仓库数</th>
            <th>Star 时间</th>
          </tr>
        </thead>
        <tbody id="user-tbody"></tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<script>
const COLORS = {
  developer: '#5b8def',
  star_enthusiast: '#4ecdc4',
  die_hard_fan: '#f5a623',
  star: '#f5c842',
  fork: '#4ecdc4',
  issue: '#e05f5f',
};
const TYPE_LABELS = { developer: '开发者', star_enthusiast: 'Star 爱好者', die_hard_fan: '铁粉' };

const DATA_VER = '?v=4';
async function loadJSON(path) {
  const r = await fetch(path + DATA_VER);
  return r.json();
}

function makeChart(id) {
  return echarts.init(document.getElementById(id), 'dark', { backgroundColor: 'transparent' });
}

// ── 页签切换 ─────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
    // 切换到仓库详情时，强制 resize 所有仓库图表
    setTimeout(() => {
      [repoTypeChart, repoTimelineChart, repoTypeTimelineChart].forEach(c => c && c.resize());
      window.dispatchEvent(new Event('resize'));
    }, 50);
  });
});

let repoTypeChart, repoTimelineChart, repoTypeTimelineChart;

async function main() {
  const [repos, allUsers, profiles] = await Promise.all([
    loadJSON('data/repos.json'),
    loadJSON('data/all_star_users.json'),
    loadJSON('data/user_profiles.json'),
  ]);

  // 建立 user_name → profile 映射
  const profileMap = {};
  profiles.forEach(p => profileMap[p.user_name] = p);

  // 建立 repo path → star 用户列表（含 star 时间）映射
  // all_star_users 只有 starred_repos，时间在 data/stars/{repo}.json 里
  // 这里我们直接用 all_star_users 结构，时间暂缺（需单独加载）
  const repoUserMap = {};
  allUsers.forEach(u => {
    u.starred_repos.forEach(rpath => {
      if (!repoUserMap[rpath]) repoUserMap[rpath] = [];
      repoUserMap[rpath].push(u);
    });
  });

  // ════════════════════════════════════════════════════════
  // 概览面板
  // ════════════════════════════════════════════════════════
  const totalStars  = repos.reduce((s, r) => s + r.star_count, 0);
  const totalForks  = repos.reduce((s, r) => s + r.forks_count, 0);
  const totalIssues = repos.reduce((s, r) => s + r.open_issues_count, 0);
  const typeCounts  = { developer: 0, star_enthusiast: 0, die_hard_fan: 0 };
  profiles.forEach(p => { typeCounts[p.user_type] = (typeCounts[p.user_type] || 0) + 1; });

  document.getElementById('stats-row').innerHTML = [
    ['仓库总数',     repos.length, ''],
    ['总 Star 数',   totalStars.toLocaleString(), ''],
    ['总 Fork 数',   totalForks.toLocaleString(), ''],
    ['开放 Issue',   totalIssues.toLocaleString(), ''],
    ['唯一 Star 用户', allUsers.length.toLocaleString(), ''],
    ['已画像用户',   profiles.length.toLocaleString(), `/ ${allUsers.length}`],
  ].map(([lbl, val, sub]) =>
    `<div class="stat-card"><div class="val">${val}<small style="font-size:14px;color:#666">${sub}</small></div><div class="lbl">${lbl}</div></div>`
  ).join('');

  document.getElementById('update-time').textContent =
    `数据采集时间：${new Date().toLocaleDateString('zh')}  ·  gitcode.com/cann`;

  // 图1：各仓库 Star/Fork/Issue
  {
    const top   = repos.slice(0, 30);
    const names = top.map(r => r.path.split('/')[1]);
    const chart = makeChart('chart-repos');
    chart.setOption({
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
      legend: { data: ['Star', 'Fork', 'Issue'], textStyle: { color: '#aaa' } },
      grid: { left: 10, right: 10, bottom: 80, containLabel: true },
      xAxis: { type: 'category', data: names, axisLabel: { rotate: 40, color: '#aaa', fontSize: 11 } },
      yAxis: { type: 'value', axisLabel: { color: '#aaa' } },
      series: [
        { name: 'Star',  type: 'bar', data: top.map(r => r.star_count),        itemStyle: { color: COLORS.star } },
        { name: 'Fork',  type: 'bar', data: top.map(r => r.forks_count),       itemStyle: { color: COLORS.fork } },
        { name: 'Issue', type: 'bar', data: top.map(r => r.open_issues_count), itemStyle: { color: COLORS.issue } },
      ],
    });
    window.addEventListener('resize', () => chart.resize());
  }

  // 图2：用户类型饼图
  {
    const chart = makeChart('chart-user-type');
    chart.setOption({
      tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
      legend: { bottom: 0, textStyle: { color: '#aaa' } },
      series: [{
        type: 'pie', radius: ['40%', '70%'], center: ['50%', '45%'],
        label: { color: '#ccc', formatter: '{b}\n{d}%' },
        data: Object.entries(typeCounts).map(([k, v]) => ({
          name: TYPE_LABELS[k], value: v, itemStyle: { color: COLORS[k] },
        })),
      }],
    });
    window.addEventListener('resize', () => chart.resize());
  }

  // 图3：各仓库非开发者占比
  {
    const rows = repos
      .filter(r => r.star_count > 0)
      .map(r => {
        const users    = repoUserMap[r.path] || [];
        const profiled = users.filter(u => profileMap[u.user_name]);
        const nonDev   = profiled.filter(u => profileMap[u.user_name]?.user_type !== 'developer');
        const rate = profiled.length > 0 ? nonDev.length / profiled.length * 100 : 0;
        return { name: r.path.split('/')[1], rate, profiled: profiled.length };
      })
      .filter(r => r.profiled >= 5)
      .sort((a, b) => b.rate - a.rate)
      .slice(0, 20);

    const chart = makeChart('chart-ghost-rate');
    chart.setOption({
      tooltip: { trigger: 'axis', formatter: p => `${p[0].name}<br/>非开发者: ${p[0].value.toFixed(1)}%` },
      grid: { left: 10, right: 20, bottom: 80, containLabel: true },
      xAxis: { type: 'category', data: rows.map(r => r.name), axisLabel: { rotate: 40, color: '#aaa', fontSize: 11 } },
      yAxis: { type: 'value', axisLabel: { color: '#aaa', formatter: '{value}%' }, max: 60 },
      series: [{
        type: 'bar',
        data: rows.map(r => ({ value: r.rate, itemStyle: { color: r.rate > 30 ? '#e05f5f' : r.rate > 15 ? '#e0a85f' : '#5b8def' } })),
      }],
    });
    window.addEventListener('resize', () => chart.resize());
  }

  // 图4：Star 数分布
  {
    const buckets = [
      { label: '1-9', min: 1, max: 10 }, { label: '10-49', min: 10, max: 50 },
      { label: '50-99', min: 50, max: 100 }, { label: '100-199', min: 100, max: 200 },
      { label: '200-499', min: 200, max: 500 }, { label: '500+', min: 500, max: Infinity },
    ];
    const chart = makeChart('chart-star-dist');
    chart.setOption({
      tooltip: { trigger: 'axis' },
      grid: { left: 10, right: 20, containLabel: true },
      xAxis: { type: 'category', data: buckets.map(b => b.label), axisLabel: { color: '#aaa' } },
      yAxis: { type: 'value', axisLabel: { color: '#aaa' }, minInterval: 1 },
      series: [{ type: 'bar', itemStyle: { color: COLORS.star }, label: { show: true, position: 'top', color: '#aaa' },
        data: buckets.map(b => repos.filter(r => r.star_count >= b.min && r.star_count < b.max).length) }],
    });
    window.addEventListener('resize', () => chart.resize());
  }

  // 图5：多仓库 star 用户
  {
    const thresholds = [2, 5, 10, 20, 30, 39];
    const chart = makeChart('chart-multi-star');
    chart.setOption({
      tooltip: { trigger: 'axis', formatter: p => `star ≥ ${thresholds[p[0].dataIndex]} 个仓库的用户：${p[0].value} 位` },
      grid: { left: 10, right: 20, containLabel: true },
      xAxis: { type: 'category', data: thresholds.map(n => n + '+'), axisLabel: { color: '#aaa' } },
      yAxis: { type: 'value', axisLabel: { color: '#aaa' } },
      series: [{ type: 'bar', itemStyle: { color: COLORS.star_enthusiast }, label: { show: true, position: 'top', color: '#aaa' },
        data: thresholds.map(n => allUsers.filter(u => u.starred_repos.length >= n).length) }],
    });
    window.addEventListener('resize', () => chart.resize());
  }

  document.getElementById('note').textContent =
    `用户画像已采集 ${profiles.length} / ${allUsers.length} 位。`;

  // ════════════════════════════════════════════════════════
  // 仓库详情面板
  // ════════════════════════════════════════════════════════
  let currentFilter = 'all';
  let currentPage   = 1;
  const PAGE_SIZE   = 20;
  let currentRepoUsers = [];

  // 加载各仓库 star 时间数据
  const starTimeMap = {}; // repo_path → { user_name → created_at }

  async function loadRepoStarTimes(repoPath) {
    if (starTimeMap[repoPath]) return;
    const safeName = repoPath.replace('/', '__');
    try {
      const data = await loadJSON(`data/stars/${safeName}.json`);
      starTimeMap[repoPath] = {};
      data.forEach(u => { starTimeMap[repoPath][u.user_name] = u.created_at; });
    } catch (e) {
      starTimeMap[repoPath] = {};
    }
  }

  // 填充仓库下拉
  const select = document.getElementById('repo-select');
  repos.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r.path;
    opt.textContent = `${r.path.split('/')[1]}  (⭐${r.star_count})`;
    select.appendChild(opt);
  });

  async function renderRepo(repoPath) {
    const repo = repos.find(r => r.path === repoPath);
    if (!repo) return;

    // 外部链接
    document.getElementById('repo-ext-link').href = `https://gitcode.com/${repoPath}`;

    // 加载 star 时间
    await loadRepoStarTimes(repoPath);
    const timeMap = starTimeMap[repoPath] || {};

    // 该仓库的用户（含 profile）
    const repoUsers = (repoUserMap[repoPath] || []).map(u => ({
      ...u,
      profile: profileMap[u.user_name] || null,
      star_time: timeMap[u.user_name] || null,
    })).sort((a, b) => (b.star_time || '') < (a.star_time || '') ? -1 : 1);

    currentRepoUsers = repoUsers;
    currentFilter    = 'all';
    currentPage      = 1;

    // 基本指标
    document.getElementById('repo-stats').innerHTML = [
      ['Star',     repo.star_count],
      ['Fork',     repo.forks_count],
      ['Issue',    repo.open_issues_count],
      ['MR',       repo.open_mr_count],
      ['Release',  repo.release_count],
    ].map(([lbl, val]) =>
      `<div class="repo-stat"><div class="val">${val ?? '-'}</div><div class="lbl">${lbl}</div></div>`
    ).join('');

    // 类型分布饼图
    const tc = { developer: 0, star_enthusiast: 0, die_hard_fan: 0 };
    repoUsers.forEach(u => {
      const t = u.profile?.user_type || 'die_hard_fan';
      tc[t] = (tc[t] || 0) + 1;
    });
    if (!repoTypeChart) repoTypeChart = makeChart('chart-repo-type');
    repoTypeChart.setOption({
      tooltip: { trigger: 'item', formatter: '{b}: {c} ({d}%)' },
      legend: { bottom: 0, textStyle: { color: '#aaa' } },
      series: [{
        type: 'pie', radius: ['40%', '70%'], center: ['50%', '45%'],
        label: { color: '#ccc', formatter: '{b}\n{d}%' },
        data: Object.entries(tc).map(([k, v]) => ({ name: TYPE_LABELS[k], value: v, itemStyle: { color: COLORS[k] } })),
      }],
    });

    // Star 时间分布（按月）
    const monthMap = {};
    repoUsers.forEach(u => {
      if (!u.star_time) return;
      const ym = u.star_time.slice(0, 7);
      monthMap[ym] = (monthMap[ym] || 0) + 1;
    });
    const months = Object.keys(monthMap).sort();
    if (!repoTimelineChart) repoTimelineChart = makeChart('chart-repo-timeline');
    repoTimelineChart.setOption({
      tooltip: { trigger: 'axis' },
      grid: { left: 10, right: 20, bottom: 60, containLabel: true },
      xAxis: { type: 'category', data: months, axisLabel: { rotate: 40, color: '#aaa', fontSize: 11 } },
      yAxis: { type: 'value', axisLabel: { color: '#aaa' } },
      series: [{ type: 'bar', data: months.map(m => monthMap[m]), itemStyle: { color: COLORS.star } }],
    });

    // 各类用户按月 star 堆叠
    const typeMonthMap = { developer: {}, star_enthusiast: {}, die_hard_fan: {} };
    repoUsers.forEach(u => {
      if (!u.star_time) return;
      const ym = u.star_time.slice(0, 7);
      const t  = u.profile?.user_type || 'die_hard_fan';
      if (!typeMonthMap[t]) typeMonthMap[t] = {};
      typeMonthMap[t][ym] = (typeMonthMap[t][ym] || 0) + 1;
    });
    if (!repoTypeTimelineChart) repoTypeTimelineChart = makeChart('chart-repo-type-timeline');
    repoTypeTimelineChart.setOption({
      tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
      legend: { data: Object.values(TYPE_LABELS), textStyle: { color: '#aaa' } },
      grid: { left: 10, right: 10, bottom: 60, containLabel: true },
      xAxis: { type: 'category', data: months, axisLabel: { rotate: 40, color: '#aaa', fontSize: 11 } },
      yAxis: { type: 'value', axisLabel: { color: '#aaa' } },
      series: Object.entries(typeMonthMap).map(([k, mmap]) => ({
        name: TYPE_LABELS[k], type: 'bar', stack: 'total',
        itemStyle: { color: COLORS[k] },
        data: months.map(m => mmap[m] || 0),
      })),
    });

    // 用户列表
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.type === 'all');
    });
    renderUserTable();
  }

  function renderUserTable() {
    console.log('filter:', currentFilter, 'total users:', currentRepoUsers.length,
      'sample type:', currentRepoUsers[0]?.profile?.user_type);
    const filtered = currentFilter === 'all'
      ? currentRepoUsers
      : currentRepoUsers.filter(u => (u.profile?.user_type || 'die_hard_fan') === currentFilter);

    const total = filtered.length;
    const totalPages = Math.ceil(total / PAGE_SIZE);
    const start = (currentPage - 1) * PAGE_SIZE;
    const page  = filtered.slice(start, start + PAGE_SIZE);

    document.getElementById('user-list-title').textContent =
      `Star 用户列表（${total} 位${currentFilter !== 'all' ? ' · 已筛选' : ''}）`;

    const tbody = document.getElementById('user-tbody');
    tbody.innerHTML = page.map((u, i) => {
      const p    = u.profile;
      const type = p?.user_type || 'die_hard_fan';
      const time = u.star_time ? u.star_time.slice(0, 10) : '-';
      return `<tr>
        <td style="color:#555">${start + i + 1}</td>
        <td><a class="user-link" href="https://gitcode.com/${u.user_name}" target="_blank">${u.user_name}</a></td>
        <td style="color:#aaa">${u.nick_name || '-'}</td>
        <td><span class="badge badge-${type}">${TYPE_LABELS[type]}</span></td>
        <td>${p?.fans_count ?? '-'}</td>
        <td>${p?.original_repo_count ?? '-'}</td>
        <td>${p?.total_contributions ?? '-'}</td>
        <td>${u.starred_repos?.length ?? '-'}</td>
        <td style="color:#666;font-size:12px">${time}</td>
      </tr>`;
    }).join('');

    // 分页
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.innerHTML = ''; return; }
    let html = '';
    if (currentPage > 1) html += `<button class="page-btn" data-p="${currentPage-1}">‹</button>`;
    const range = 5;
    let s = Math.max(1, currentPage - 2), e = Math.min(totalPages, s + range - 1);
    if (e - s < range - 1) s = Math.max(1, e - range + 1);
    for (let p = s; p <= e; p++)
      html += `<button class="page-btn${p === currentPage ? ' active' : ''}" data-p="${p}">${p}</button>`;
    if (currentPage < totalPages) html += `<button class="page-btn" data-p="${currentPage+1}">›</button>`;
    html += `<span class="page-info">共 ${total} 位 / ${totalPages} 页</span>`;
    pg.innerHTML = html;
    pg.querySelectorAll('.page-btn').forEach(btn => {
      btn.addEventListener('click', () => { currentPage = +btn.dataset.p; renderUserTable(); });
    });
  }

  // 筛选按钮
  document.getElementById('filter-btns').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.type;
    currentPage   = 1;
    renderUserTable();
  });

  // 仓库切换
  select.addEventListener('change', () => renderRepo(select.value));

  // 默认加载第一个仓库
  if (repos.length > 0) renderRepo(repos[0].path);
}

main().catch(console.error);
</script>
</body>
</html>
